<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Procesador de Mapas</title>
  <style>
    body {
      font-family: monospace;
      background: #111;
      color: #eee;
      padding: 20px;
    }
    button {
      margin-left: 10px;
    }
    pre {
      margin-top: 20px;
      max-height: 70vh;
      overflow: auto;
      background: #000;
      padding: 10px;
      border: 1px solid #333;
    }
  </style>
</head>
<body>

  <h2>Procesador de mapas (2048×2048)</h2>

  <input type="file" id="inputImage" accept="image/png">
  <button id="runBtn">Procesar</button>

  <pre id="output">Esperando imagen…</pre>

  <script src="script.js"></script>
</body>
</html>
