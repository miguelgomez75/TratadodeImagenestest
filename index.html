<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Procesador de Mapas</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <header>
    <h1>Procesador de mapas 2048×2048</h1>
  </header>

  <section id="controls">
    <input type="file" id="inputImage" accept="image/png">
    <button id="runBtn">Procesar</button>
    <button id="downloadBtn" disabled>Descargar TXT</button>
  </section>

  <section id="result">
    <pre id="output">Esperando imagen…</pre>
  </section>

  <script src="script.js"></script>
</body>
</html>
