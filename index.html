<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Procesador de Mapas</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <div class="app">

    <h1>Procesador de mapas</h1>

    <div class="controls">
      <input type="file" id="inputImage" accept="image/png">
      <button id="runBtn">Procesar</button>
      <button id="downloadBtn" disabled>Descargar Tabla (CSV)</button> 
    </div>

    <div class="progress-container">
      <div class="progress-bar" id="progressBar"></div>
    </div>
    <div class="progress-text" id="progressText">Esperando imagen…</div>

    <div id="output-container"></div>

  </div>

  <script src="script.js"></script>
</body>
</html>
